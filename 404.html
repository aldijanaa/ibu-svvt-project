<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Budgie</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/') + l.hash
      );
    </script>
  </head>
</html>
